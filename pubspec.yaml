  cupertino_icons: ^1.0.8
  uuid: ^4.0.0
  share_plus: 11.0.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
