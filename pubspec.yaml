name: kuvio
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  intl: ^0.20.2
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.0.0
  firebase_auth: ^5.5.3
  google_sign_in: ^7.1.1
  cloud_firestore: ^5.6.7
  image_picker: ^1.0.4
